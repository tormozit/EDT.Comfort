name: Deploy p2 Update Site with History

# Тег v<версия> (например v1.0.0.10) — один раз на линейку версии.
# Повторные сборки: push в master или Actions → Run workflow (НЕ "Re-run jobs" — он берёт старый коммит!).
on:
  workflow_dispatch:
  push:
    branches:
#     - master
    tags:
#     - 'v[0-9]*.[0-9]*.[0-9]*.[0-9]*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4.2.2

      - name: Build info
        run: |
          echo "Commit: $GITHUB_SHA"
          echo "Ref: $GITHUB_REF (type: $GITHUB_REF_TYPE)"
          echo "Maven modules:"
          grep '<module>' pom.xml
          echo "Target platform:"
          grep -A1 '<file>' pom.xml || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate tag matches version.txt
        if: github.ref_type == 'tag'
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          FILE_VER=$(grep 'comfort.release=' site/version.txt | cut -d= -f2 | tr -d '[:space:]')
          if [ "$TAG_VER" != "$FILE_VER" ]; then
            echo "ERROR: tag v$TAG_VER does not match comfort.release=$FILE_VER in version.txt"
            exit 1
          fi
          echo "Tag v$TAG_VER matches version.txt"

      - name: Sync version
        run: pwsh site/sync-version.ps1

      - name: Verify Maven modules
        run: |
          if grep -q '<module>target</module>' pom.xml; then
            echo "ERROR: pom.xml references removed target/ module."
            echo "You are on an old commit ($GITHUB_SHA). Use 'Run workflow' on master, not 'Re-run jobs'."
            exit 1
          fi
          if ! grep -q 'tp/tp.target' pom.xml; then
            echo "ERROR: pom.xml must reference tp/tp.target as target platform file."
            exit 1
          fi
          test -f tp/tp.target || (echo "ERROR: tp/tp.target not found" && exit 1)

      - name: Build with Maven
        run: mvn -B clean package

      - name: Read built version
        id: version
        run: |
          JAR=$(ls site/target/repository/features/tormozit.comfort.feature_*.jar | head -1)
          VER=$(basename "$JAR" .jar | sed 's/tormozit.comfort.feature_//')
          echo "Built version: $VER"
          echo "release_version=$VER" >> $GITHUB_OUTPUT

      - name: Checkout existing gh-pages
        uses: actions/checkout@v4.2.2
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Prepare version folder
        run: |
          mkdir -p deploy
          cp -r site/target/repository "deploy/${{ steps.version.outputs.release_version }}"

          if [ -d "gh-pages" ]; then
            for dir in gh-pages/*/; do
              name=$(basename "$dir")
              if [[ "$name" != "p2.index" && "$name" != "compositeContent.jar" && "$name" != "compositeArtifacts.jar" && "$name" != "index.html" ]]; then
                if [ ! -d "deploy/$name" ]; then
                  cp -r "$dir" "deploy/$name"
                fi
              fi
            done
          fi

      - name: Generate composite metadata
        run: python3 .github/workflows/generate_composite.py

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.7.3
        with:
          folder: deploy
          branch: gh-pages
          clean: true
          clean-exclude: |
            [0-9]*.[0-9]*.[0-9]*.[0-9]*/
            [0-9]*.[0-9]*.[0-9]*.[0-9]*-[0-9]*/
          commit-message: "Add update site ${{ steps.version.outputs.release_version }}"
