name: Deploy p2 Update Site with History

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sync version
        run: pwsh site/sync-version.ps1

      - name: Remove stale target/ module if present
        run: rm -rf target/

      - name: Build with Maven
        run: mvn -B clean package

      - name: Read built version
        id: version
        run: |
          JAR=$(ls site/target/repository/features/tormozit.comfort.feature_*.jar | head -1)
          VER=$(basename "$JAR" .jar | sed 's/tormozit.comfort.feature_//')
          echo "Built version: $VER"
          echo "release_version=$VER" >> $GITHUB_OUTPUT

      - name: Checkout existing gh-pages
        uses: actions/checkout@v4.2.2
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Prepare version folder
        run: |
          mkdir -p deploy
          cp -r site/target/repository "deploy/${{ steps.version.outputs.release_version }}"

          if [ -d "gh-pages" ]; then
            for dir in gh-pages/*/; do
              name=$(basename "$dir")
              if [[ "$name" != "p2.index" && "$name" != "compositeContent.jar" && "$name" != "compositeArtifacts.jar" && "$name" != "index.html" ]]; then
                if [ ! -d "deploy/$name" ]; then
                  cp -r "$dir" "deploy/$name"
                fi
              fi
            done
          fi

      - name: Generate composite metadata
        run: python3 .github/workflows/generate_composite.py

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.7.3
        with:
          folder: deploy
          branch: gh-pages
          clean: true
          clean-exclude: |
            [0-9]*.[0-9]*.[0-9]*.[0-9]*/
            [0-9]*.[0-9]*.[0-9]*.[0-9]*-[0-9]*/
          commit-message: "Add update site ${{ steps.version.outputs.release_version }}"
