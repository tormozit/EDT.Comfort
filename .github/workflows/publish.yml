name: Publish p2 site

# Локально: Eclipse Build All в site/ → закоммитить
# site/features/, site/plugins/, site/content.jar, site/artifacts.jar → Run workflow.
on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: ver
        run: |
          VER=$(grep 'comfort.release=' site/version.txt | cut -d= -f2 | tr -d '[:space:]')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Publishing version: $VER"

      - name: Verify p2 repository is committed
        run: |
          if [ ! -d site/features ]; then
            echo "ERROR: site/features/ not found in git."
            echo "Build locally, then commit p2 artifacts:"
            echo "  site/features/  site/plugins/  site/content.jar  site/artifacts.jar"
            exit 1
          fi
          ls -la site/features/ site/plugins/ 2>/dev/null || true
          ls -la site/*.jar 2>/dev/null || true

      - name: Stash p2 artifacts
        run: |
          mkdir -p p2-staging
          for item in features plugins content.jar artifacts.jar p2.index; do
            if [ -e "site/$item" ]; then
              cp -r "site/$item" p2-staging/
            fi
          done
          ls -laR p2-staging

      - name: Prepare deploy folder
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          mkdir -p "deploy/$VER"
          cp -r p2-staging/. "deploy/$VER/"

          if git fetch origin gh-pages 2>/dev/null && git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            mkdir -p /tmp/old-pages
            git archive origin/gh-pages | tar -x -C /tmp/old-pages
            shopt -s nullglob
            for dir in /tmp/old-pages/*/; do
              name=$(basename "$dir")
              case "$name" in
                p2.index|compositeContent.jar|compositeArtifacts.jar|index.html) continue ;;
              esac
              if [ ! -d "deploy/$name" ]; then
                cp -r "$dir" "deploy/$name"
              fi
            done
          else
            echo "No gh-pages branch yet — first publish."
          fi

          ls -la deploy
          ls -la "deploy/$VER"

      - name: Generate p2 site layout
        env:
          LATEST_VERSION: ${{ steps.ver.outputs.version }}
        run: python3 .github/workflows/generate_composite.py

      - name: Verify deploy folder before push
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          test -d "deploy/$VER/features" || (echo "ERROR: deploy/$VER/features missing" && exit 1)
          test -d "deploy/$VER/plugins" || (echo "ERROR: deploy/$VER/plugins missing" && exit 1)
          test -f deploy/compositeContent.jar || (echo "ERROR: deploy/compositeContent.jar missing at root" && exit 1)
          test -f deploy/compositeContent.xml || (echo "ERROR: deploy/compositeContent.xml missing at root" && exit 1)
          test -f deploy/compositeArtifacts.jar || (echo "ERROR: deploy/compositeArtifacts.jar missing at root" && exit 1)
          test -f deploy/p2.index || (echo "ERROR: deploy/p2.index missing" && exit 1)
          test -f "deploy/$VER/p2.index" || (echo "ERROR: deploy/$VER/p2.index missing" && exit 1)
          test -f deploy/.nojekyll || (echo "ERROR: deploy/.nojekyll missing" && exit 1)
          grep -q compositeContent deploy/p2.index || (echo "ERROR: root p2.index must reference compositeContent" && exit 1)
          grep -q "<child location='$VER/'/>" deploy/compositeContent.xml || (echo "ERROR: $VER missing from compositeContent.xml" && exit 1)
          test ! -f deploy/content.jar || (echo "ERROR: root content.jar must not exist (use composite repo)" && exit 1)
          grep -q "unit id='tormozit.comfort'" "deploy/$VER/content.xml" || (echo "ERROR: bundle IU missing from deploy/$VER/content.xml" && exit 1)
          mkdir -p /tmp/site-ver-check
          unzip -p site/content.jar content.xml > /tmp/site-ver-check/content.xml
          SITE_VER=$(grep -o "id='tormozit.comfort' version='[^']*'" /tmp/site-ver-check/content.xml | head -1 | sed "s/.*version='\\([^']*\\)'.*/\\1/")
          DEPLOY_VER=$(grep -o "id='tormozit.comfort' version='[^']*'" "deploy/$VER/content.xml" | head -1 | sed "s/.*version='\\([^']*\\)'.*/\\1/")
          echo "site/content.jar version: $SITE_VER"
          echo "deploy/$VER/content.xml version: $DEPLOY_VER"
          test -n "$SITE_VER" && test -n "$DEPLOY_VER" || (echo "ERROR: cannot read bundle version from site/deploy content" && exit 1)
          test "$SITE_VER" = "$DEPLOY_VER" || (echo "ERROR: deploy version ($DEPLOY_VER) != committed site ($SITE_VER). Push site/ and re-run workflow." && exit 1)
          echo "deploy tree:"
          find deploy -maxdepth 3 -type f | head -30

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Publish p2 site ${{ steps.ver.outputs.version }}"
