name: Publish p2 site

# Локально: site\clean.bat → Build All на проекте site в PDE → закоммитить
# site/features/, site/plugins/, site/content.jar, site/artifacts.jar → Run workflow.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'new — новая линейка; republish — та же линейка (новый qualifier или перекладка gh-pages с тем же билдом)'
        required: true
        default: 'new'
        type: choice
        options:
          - new
          - republish

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: ver
        run: |
          VER=$(grep 'comfort.release=' site/version.txt | cut -d= -f2 | tr -d '[:space:]')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Publishing version: $VER"

      - name: Verify p2 repository is committed
        run: |
          if [ ! -d site/features ]; then
            echo "ERROR: site/features/ not found in git."
            echo "Build locally, then commit p2 artifacts:"
            echo "  site/features/  site/plugins/  site/content.jar  site/artifacts.jar"
            exit 1
          fi
          ls -la site/features/ site/plugins/ 2>/dev/null || true
          ls -la site/*.jar 2>/dev/null || true

      - name: Verify release artifacts
        run: bash .github/workflows/verify_p2_site.sh "${{ inputs.mode }}"

      - name: Stash p2 artifacts
        run: |
          mkdir -p p2-staging
          for item in features plugins content.jar artifacts.jar p2.index; do
            if [ -e "site/$item" ]; then
              cp -r "site/$item" p2-staging/
            fi
          done
          ls -laR p2-staging

      - name: Prepare deploy folder
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          mkdir -p "deploy/$VER"
          cp -r p2-staging/. "deploy/$VER/"

          : > /tmp/old-pages-versions.txt
          if git fetch origin gh-pages 2>/dev/null && git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            mkdir -p /tmp/old-pages
            git archive origin/gh-pages | tar -x -C /tmp/old-pages
            shopt -s nullglob
            for dir in /tmp/old-pages/*/; do
              name=$(basename "$dir")
              case "$name" in
                p2.index|compositeContent.jar|compositeArtifacts.jar|index.html) continue ;;
              esac
              if [[ "$name" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "$name" >> /tmp/old-pages-versions.txt
              fi
              if [ ! -d "deploy/$name" ]; then
                cp -r "$dir" "deploy/$name"
              fi
            done
          else
            echo "No gh-pages branch yet — first publish."
          fi

          ls -la deploy
          ls -la "deploy/$VER"
          echo "Previous gh-pages versions:"
          cat /tmp/old-pages-versions.txt || true

      - name: Generate p2 site layout
        env:
          LATEST_VERSION: ${{ steps.ver.outputs.version }}
        run: python3 .github/workflows/generate_composite.py

      - name: Verify deploy folder before push
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          test -d "deploy/$VER/features" || (echo "ERROR: deploy/$VER/features missing" && exit 1)
          test -d "deploy/$VER/plugins" || (echo "ERROR: deploy/$VER/plugins missing" && exit 1)
          test -f deploy/compositeContent.jar || (echo "ERROR: deploy/compositeContent.jar missing at root" && exit 1)
          test -f deploy/compositeContent.xml || (echo "ERROR: deploy/compositeContent.xml missing at root" && exit 1)
          test -f deploy/compositeArtifacts.jar || (echo "ERROR: deploy/compositeArtifacts.jar missing at root" && exit 1)
          test -f deploy/compositeArtifacts.xml || (echo "ERROR: deploy/compositeArtifacts.xml missing at root" && exit 1)
          test -f deploy/p2.index || (echo "ERROR: deploy/p2.index missing" && exit 1)
          test -f "deploy/$VER/p2.index" || (echo "ERROR: deploy/$VER/p2.index missing" && exit 1)
          test -f deploy/.nojekyll || (echo "ERROR: deploy/.nojekyll missing" && exit 1)
          grep -q compositeContent deploy/p2.index || (echo "ERROR: root p2.index must reference compositeContent" && exit 1)
          grep -q "<child location='$VER/'/>" deploy/compositeContent.xml || (echo "ERROR: $VER missing from compositeContent.xml" && exit 1)
          test ! -f deploy/content.jar || (echo "ERROR: root content.jar must not exist (use composite repo)" && exit 1)
          grep -q "unit id='tormozit.comfort'" "deploy/$VER/content.xml" || (echo "ERROR: bundle IU missing from deploy/$VER/content.xml" && exit 1)

          shopt -s nullglob
          version_dirs=()
          for dir in deploy/*/; do
            name=$(basename "$dir")
            [[ "$name" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]] || continue
            version_dirs+=("$name")
            grep -q "<child location='$name/'/>" deploy/compositeContent.xml || (echo "ERROR: $name missing from compositeContent.xml" && exit 1)
            grep -q "<child location='$name/'/>" deploy/compositeArtifacts.xml || (echo "ERROR: $name missing from compositeArtifacts.xml" && exit 1)
            test -d "deploy/$name/features" || (echo "ERROR: deploy/$name/features missing" && exit 1)
            test -d "deploy/$name/plugins" || (echo "ERROR: deploy/$name/plugins missing" && exit 1)
            if grep -q "<update id=" "deploy/$name/content.xml" 2>/dev/null; then
              echo "ERROR: deploy/$name/content.xml still contains p2 update metadata"
              exit 1
            fi
            if grep -q "tormozit.github.io/EDT.Comfort/" "deploy/$name/content.xml" 2>/dev/null; then
              echo "ERROR: deploy/$name/content.xml still references composite parent URL"
              exit 1
            fi
          done

          child_count=$(grep -o "<child location='" deploy/compositeContent.xml | wc -l | tr -d ' ')
          dir_count=${#version_dirs[@]}
          if [[ "$child_count" -ne "$dir_count" ]]; then
            echo "ERROR: composite children ($child_count) != version folders ($dir_count)"
            exit 1
          fi

          if [[ -f /tmp/old-pages-versions.txt ]]; then
            while IFS= read -r old_ver || [[ -n "$old_ver" ]]; do
              [[ -z "$old_ver" ]] && continue
              if [[ "$old_ver" != "$VER" ]] && [[ ! -d "deploy/$old_ver" ]]; then
                echo "ERROR: previous gh-pages version $old_ver missing from deploy/"
                exit 1
              fi
            done < /tmp/old-pages-versions.txt
          fi

          while IFS= read -r child_loc; do
            [[ -z "$child_loc" ]] && continue
            child_name="${child_loc%/}"
            if [[ ! -d "deploy/$child_name" ]]; then
              echo "ERROR: composite child $child_name has no folder deploy/$child_name/"
              exit 1
            fi
          done < <(grep -o "location='[^']*'" deploy/compositeContent.xml | sed "s/location='//;s/'$//")

          echo "Version folders (${dir_count}): ${version_dirs[*]}"
          echo "deploy tree:"
          find deploy -maxdepth 3 -type f | head -30

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Publish p2 site ${{ steps.ver.outputs.version }}"
