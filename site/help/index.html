<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>EDT Comfort — справка</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #2563eb; }
  </style>
</head>
<body>
  <div id="app">Загрузка справки…</div>
  <script>
    window.__DOCS_CACHE_BUST__ = '{{DOCS_CACHE_BUST}}';
    (function () {
      var bust = window.__DOCS_CACHE_BUST__;
      if (!bust) return;
      try {
        var prev = localStorage.getItem('comfort-help-bust');
        if (prev !== bust) {
          Object.keys(localStorage).forEach(function (key) {
            if (key.indexOf('docsify') >= 0) localStorage.removeItem(key);
          });
          localStorage.setItem('comfort-help-bust', bust);
        }
      } catch (e) { /* ignore */ }
      function withBust(url) {
        if (typeof url !== 'string' || url.indexOf('.md') < 0) return url;
        return url + (url.indexOf('?') >= 0 ? '&' : '?') + 'cb=' + encodeURIComponent(bust);
      }
      var origOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function (method, url) {
        var args = Array.prototype.slice.call(arguments);
        args[1] = withBust(url);
        return origOpen.apply(this, args);
      };
      if (window.fetch) {
        var origFetch = window.fetch;
        window.fetch = function (input, init) {
          if (typeof input === 'string') {
            return origFetch(withBust(input), init);
          }
          if (input && input.url) {
            return origFetch(withBust(input.url), init);
          }
          return origFetch(input, init);
        };
      }
    })();
  </script>
  <script>
    window.$docsify = {
      name: 'EDT Comfort',
      repo: 'https://github.com/tormozit/EDT.Comfort',
      homepage: 'README.md',
      relativePath: true,
      loadSidebar: false,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Поиск',
        noData: 'Ничего не найдено',
      },
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
