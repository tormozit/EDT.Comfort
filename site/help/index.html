<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>EDT Comfort — справка</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #2563eb; }
  </style>
</head>
<body>
  <div id="app">Загрузка справки…</div>
  <script>
    window.$docsify = {
      name: 'EDT Comfort',
      repo: 'https://github.com/tormozit/EDT.Comfort',
      homepage: 'README.md',
      relativePath: true,
      loadSidebar: false,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Поиск',
        noData: 'Ничего не найдено',
      },
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
